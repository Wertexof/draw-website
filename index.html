<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon Paint</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        <h1>Hackathon Canvas</h1>
        
        <div class="toolbar">
            <input type="color" id="colorPicker" value="#000000">
            <input type="range" id="brushSize" min="1" max="50" value="5">
            <button id="eraserBtn">Eraser</button>
            <button id="clearBtn">Clear</button>

            <button id="saveBtn">Save to Cloud</button>
            <button id="exportPngBtn">Export PNG</button>
            <button id="exportPdfBtn">Export PDF</button>
        </div>

        <canvas id="drawingBoard" width="600" height="400"></canvas>
        <div class="gallery-section">
            <h2>Community Gallery</h2>
            <p>Click any image to load it back onto the canvas!</p>
            
            <div id="galleryContainer" class="gallery-grid"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="app.js"></script> </body>
    <script type="module" src="app.js"></script>
</body>
</html>
